# ========================================
# RENDER DEPLOYMENT CONFIGURATION
# ========================================

services:
  # Django Backend Service
  - type: web
    name: kilicare-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: daphne config.kilicare.asgi:application -b 0.0.0.0 -p $PORT
    envVars:
      # Django Settings
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: ENV
        value: production
      - key: DJANGO_DEBUG
        value: false
      
      # Security Secrets (MUST BE SET IN RENDER DASHBOARD)
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      
      # Allowed Hosts (CORRECT RENDER DOMAIN)
      - key: ALLOWED_HOSTS
        value: kilicare-1.onrender.com,.onrender.com
      
      # CORS Configuration (INCLUDE RENDER DOMAIN)
      - key: CORS_ALLOWED_ORIGINS
        value: https://kilicare-hub.vercel.app,https://kilicare-1.onrender.com,https://*.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://kilicare-hub.vercel.app,https://kilicare-1.onrender.com,https://*.onrender.com
      
      # Database (Render PostgreSQL - AUTOMATICALLY PROVIDED)
      - key: DATABASE_URL
        fromDatabase:
          name: kilicare-db
          property: connectionString
      
      # Redis (Render Redis - AUTOMATICALLY PROVIDED)
      - key: REDIS_URL
        fromService:
          type: redis
          name: kilicare-redis
          property: connectionString
      
      # Celery
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: kilicare-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: kilicare-redis
          property: connectionString
      
      # Groq AI
      - key: GROQ_API_KEY
        sync: false
      
      # Email (Gmail)
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false

  # Celery Worker Service
  - type: worker
    name: kilicare-celery-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A config worker -l info
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: ENV
        value: production
      - key: DJANGO_DEBUG
        value: false
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: kilicare-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: kilicare-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: kilicare-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: kilicare-redis
          property: connectionString
      - key: GROQ_API_KEY
        sync: false

  # Celery Beat Service
  - type: worker
    name: kilicare-celery-beat
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: ENV
        value: production
      - key: DJANGO_DEBUG
        value: false
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: kilicare-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: kilicare-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: kilicare-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: kilicare-redis
          property: connectionString
      - key: GROQ_API_KEY
        sync: false

# Database
databases:
  - name: kilicare-db
    databaseName: kilicare_prod
    user: kilicare_user

# Redis
redis:
  - name: kilicare-redis
    maxmemoryPolicy: allkeys-lru
